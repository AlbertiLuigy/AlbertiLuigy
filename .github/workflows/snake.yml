name: Generate Datas

on:
  schedule: # Vai rodar e atualizar a cobrinha a cada 12 horas
    - cron: "* */12 * * *"
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Puxa a animação da cobrinha
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: AlbertiLuigy
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Joga a imagem gerada para uma branch separada (chamada output)
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
